<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#333B6B"/>
      <stop offset="1" stop-color="#252C52"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- line-style photo frame -->
  <rect x="106" y="128" width="292" height="248" rx="26" fill="none"
        stroke="#F7F3EA" stroke-width="24"/>
  <circle cx="196" cy="204" r="27" fill="#F2B23E"/>
  <path d="M142 328 L226 234 L276 288 L318 244 L364 296" fill="none"
