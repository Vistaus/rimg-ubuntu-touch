  <!-- key badge: access is by app-generated key -->
  <circle cx="376" cy="376" r="94" fill="#F2B23E" stroke="#252C52" stroke-width="14"/>
  <circle cx="348" cy="348" r="24" fill="none" stroke="#252C52" stroke-width="18"/>
